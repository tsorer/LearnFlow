server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api/* → API Server (strips /api prefix)
    # Resolve "api" per request via Docker's embedded DNS (127.0.0.11) so a
    # restarted API container (new IP) is picked up automatically. With a
    # literal host, nginx resolves the upstream only once at startup and
    # returns 502 ("connection refused") after the API moves to a new IP.
    location /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $api_upstream api;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://$api_upstream:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
        client_max_body_size 11m;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
