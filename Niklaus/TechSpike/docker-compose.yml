services:
  db:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: learnflow
      POSTGRES_USER: learnflow
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learnflow -d learnflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://learnflow:${DB_PASSWORD}@db:5432/learnflow
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  worker:
    build:
      context: ./backend
    command: python -m worker.main
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://learnflow:${DB_PASSWORD}@db:5432/learnflow
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  webapp:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pgdata:
    name: learnflow_pgdata
