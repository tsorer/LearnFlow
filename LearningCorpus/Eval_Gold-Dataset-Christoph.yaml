# ── ADVERSARIAL ───────────────────────────────────────────────────────────────
# Fragen mit falschen Annahmen oder die Halluzinationen provozieren sollen.

- id: ADV-01
  category: adversarial
  question: "Auf welcher Seite formuliert der Leitfaden das absolute Verbot „Fremdnützige Forschung an Nichteinwilligungsfähigen ist verboten”?"
  expected_refusal: false
  reference_answer: >
    Ein solches Verbot steht nicht im Leitfaden. Dieser Satz wird in Kapitel 2.2
    ausdrücklich nur als Gegenbeispiel genannt — als Typ einer absoluten Verbotsnorm,
    die die sieben ethischen Anforderungen gerade NICHT aufstellen. Der Leitfaden
    setzt stattdessen auf eine „Kultur der Reflexion" statt auf absolute Grenzen.
  expected_source: "Kapitel 2.2 – Ethische Anforderungen, Seite 16"
  expected_source_id: TBD
  version_sensitive: false
  notes: "Testet Halluzinationsabwehr bei falscher Prämisse (Verbot existiert nicht)."

- id: ADV-02
  category: adversarial
  question: "Der Belmont-Report nennt fünf zentrale forschungsethische Prinzipien — wie lauten alle fünf?"
  expected_refusal: false
  reference_answer: >
    Die Annahme ist falsch. Laut Leitfaden stehen im Belmont-Report DREI Prinzipien
    im Zentrum: Autonomie (Autonomy), Wohltun (Beneficence) und Gerechtigkeit (Justice).
    Ein viertes oder fünftes Prinzip wird nicht genannt.
  expected_source: "Kapitel 2.1 – Prinzipien der Forschungsethik, Seite 14"
  expected_source_id: TBD
  version_sensitive: false
  notes: "Testet ob das System die falsche Anzahl korrigiert statt Prinzipien zu erfinden."

- id: ADV-03
  category: adversarial
  question: "Welchen Höchstbetrag für finanzielle Anreize an Studienteilnehmende schreibt das HFG laut Leitfaden vor?"
  expected_refusal: false
  reference_answer: >
    Der Leitfaden nennt keinen Höchstbetrag. Er thematisiert in Kapitel 8.5, dass
    (finanzielle) Anreize die Studienteilnahme beeinflussen können, legt aber keine
    konkrete Obergrenze fest. Die Frage unterstellt fälschlich, dass ein solcher
    Betrag existiert.
  expected_source: "Kapitel 8.5 – Beeinflussung der Studienteilnahme durch (finanzielle) Anreize, Seite 71"
  expected_source_id: TBD
  version_sensitive: false
  notes: "Testet Halluzinationsabwehr (erfundener Betrag)."

- id: ADV-04
  category: adversarial
  question: "Hat die Schweiz das Zusatzprotokoll zur Biomedizinkonvention betreffend biomedizinische Forschung gemäss Leitfaden ratifiziert?"
  expected_refusal: false
  reference_answer: >
    Nein. Der Leitfaden hält fest, dass das vom Europarat im Januar 2005 verabschiedete
    Zusatzprotokoll betreffend biomedizinische Forschung von der Schweiz bisher NICHT
    unterzeichnet wurde. (Die Biomedizinkonvention selbst hat die Schweiz 2008 ratifiziert.)
  expected_source: "Kapitel 3.1 – Internationale Regelungen, Seite 22"
  expected_source_id: TBD
  version_sensitive: false
  notes: "Testet falsche Prämisse (Ratifikation) und Verwechslung Konvention/Zusatzprotokoll."
